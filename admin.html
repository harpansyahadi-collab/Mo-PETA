<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Admin Panel | Mo-PETA</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== LOGIN SCREEN ========== -->
  <div class="login-screen" id="loginScreen">
    <div class="login-card">
      <div class="login-logo">🗺️</div>
      <h1>Mo-PETA Admin</h1>
      <p>Masukkan kode akses untuk membuka panel admin</p>

      <div class="login-error" id="loginErr" style="display:none;">
        Kode akses salah. Silakan coba lagi.
      </div>

      <div class="form-group">
        <input id="inputKode" type="password" class="form-control"
               placeholder="Kode akses admin"
               style="text-align:center;letter-spacing:3px;"
               onkeypress="if(event.key==='Enter')doLogin()" autocomplete="off" />
      </div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">Masuk</button>
      <a href="index.html" class="login-back">← Kembali ke Beranda</a>
    </div>
  </div>

  <!-- ========== ADMIN PANEL ========== -->
  <div id="adminScreen" style="display:none;">
    <div class="admin-wrap">

      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-brand">🗺️ Mo-PETA</div>
          <div class="sidebar-sub">Admin Panel</div>
          <button class="sidebar-close-btn" onclick="tutupSidebar()">✕</button>
        </div>

        <nav class="sidebar-nav">
          <button class="sidebar-link active" onclick="gotoPanel('dashboard', this)">
            <span class="licon">📊</span> Dashboard
          </button>
          <button class="sidebar-link" onclick="gotoPanel('pesanan', this)">
            <span class="licon">📋</span> Daftar Pesanan
          </button>
        </nav>

        <div class="sidebar-footer">
          <button class="btn-logout" onclick="doLogout()">🚪 Keluar</button>
        </div>
      </aside>

      <div class="sidebar-overlay" id="sidebarOverlay" onclick="tutupSidebar()"></div>

      <!-- MAIN -->
      <div class="admin-main">

        <!-- TOPBAR -->
        <header class="admin-topbar">
          <button class="topbar-toggle" onclick="bukaSidebar()">☰</button>
          <div class="topbar-title" id="topbarTitle">Dashboard</div>
          <button class="topbar-refresh" onclick="muatData()" title="Refresh">🔄 Refresh</button>
        </header>

        <div class="admin-content">

          <!-- PANEL: DASHBOARD -->
          <div class="admin-panel active" id="panelDashboard">
            <div class="stats-grid">
              <div class="stat-card stat-green">
                <div class="stat-num" id="sTotal">—</div>
                <div class="stat-label">Total Pesanan</div>
              </div>
              <div class="stat-card stat-amber">
                <div class="stat-num" id="sMenunggu">—</div>
                <div class="stat-label">Menunggu</div>
              </div>
              <div class="stat-card stat-blue">
                <div class="stat-num" id="sProses">—</div>
                <div class="stat-label">Diproses</div>
              </div>
              <div class="stat-card stat-done">
                <div class="stat-num" id="sSelesai">—</div>
                <div class="stat-label">Selesai</div>
              </div>
            </div>

            <h3 style="font-size:.95rem;font-weight:700;margin-bottom:12px;color:var(--text);">
              Pesanan Terbaru
            </h3>
            <div class="tbl-wrap" id="tblTerbaru">
              <div class="tbl-empty"><div class="ei">⏳</div>Memuat...</div>
            </div>
          </div>

          <!-- PANEL: DAFTAR PESANAN -->
          <div class="admin-panel" id="panelPesanan">
            <div class="tbl-controls">
              <input id="inputCari" type="text" placeholder="🔍 Cari nama, NIM, ID..."
                     oninput="filterTabel()" />
              <select id="filterStatus" onchange="filterTabel()">
                <option value="">Semua Status</option>
                <option>Menunggu Konfirmasi</option>
                <option>Dikonfirmasi</option>
                <option>Sedang Diproses</option>
                <option>Revisi</option>
                <option>Selesai</option>
              </select>
            </div>
            <div class="tbl-wrap" id="tblSemua">
              <div class="tbl-empty"><div class="ei">⏳</div>Memuat...</div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <!-- MODAL UPDATE STATUS -->
  <div class="modal-bg" id="modalUpdateBg" onclick="tutupModalUpdate(event)">
    <div class="modal" id="modalUpdate">
      <button class="modal-close" onclick="tutupModalUpdate(null,true)">✕</button>
      <h2>Update Status Pesanan</h2>

      <div class="admin-modal-info" id="updateInfo"></div>

      <div class="form-group">
        <label for="selectStatus">Status Baru</label>
        <select id="selectStatus" class="form-control">
          <option>Menunggu Konfirmasi</option>
          <option>Dikonfirmasi</option>
          <option>Sedang Diproses</option>
          <option>Revisi</option>
          <option>Selesai</option>
        </select>
      </div>

      <div class="form-group">
        <label for="catatanAdmin">Catatan Admin (opsional)</label>
        <textarea id="catatanAdmin" class="form-control" rows="3"
                  placeholder="Catatan untuk pemesan (opsional)"></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary btn-full" id="btnSimpan" onclick="simpanStatus()">
          <span id="simpanLabel">Simpan</span>
          <span id="simpanLoad" style="display:none;">⏳ Menyimpan...</span>
        </button>
        <button class="btn btn-gray btn-sm" onclick="tutupModalUpdate(null,true)">Batal</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
